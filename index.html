<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ontstressen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --bg-warm: #1a1611;
            --text: #c4b5a0;
            --text-dim: #6b5e4f;
            --text-bright: #e8dcc8;
            --glow-core: #d4a043;
            --glow-mid: #c4762a;
            --glow-outer: #8b4513;
            --sage: #7a8b6f;
            --sage-dim: rgba(122, 139, 111, 0.15);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Grain overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.035;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
            z-index: 9999;
        }

        /* Warm ambient background washes */
        .wash {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            will-change: transform;
        }
        .wash-1 {
            width: 50vmax; height: 50vmax;
            background: radial-gradient(circle, rgba(139, 69, 19, 0.12) 0%, transparent 70%);
            top: -15vmax; right: -10vmax;
            animation: sway1 35s ease-in-out infinite;
        }
        .wash-2 {
            width: 60vmax; height: 60vmax;
            background: radial-gradient(circle, rgba(122, 139, 111, 0.08) 0%, transparent 70%);
            bottom: -20vmax; left: -15vmax;
            animation: sway2 40s ease-in-out infinite;
        }
        .wash-3 {
            width: 35vmax; height: 35vmax;
            background: radial-gradient(circle, rgba(196, 118, 42, 0.06) 0%, transparent 70%);
            top: 40%; left: 55%;
            animation: sway3 28s ease-in-out infinite;
        }

        @keyframes sway1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-40px, 30px) scale(1.05); } }
        @keyframes sway2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -20px) scale(1.08); } }
        @keyframes sway3 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-20px, -30px) scale(1.1); } }

        /* ── Tab navigation ── */
        .tabs {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(196, 181, 160, 0.08);
            border-radius: 999px;
            padding: 3px;
            z-index: 100;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 6px 20px;
            border-radius: 999px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 0.08em;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active {
            background: rgba(212, 160, 67, 0.08);
            color: var(--glow-core);
        }

        /* ── Views ── */
        .view {
            display: none;
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .view.active { display: flex; }

        /* ── Breathing view ── */
        .breath-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
            padding: 20px;
        }

        .orb-wrap {
            position: relative;
            width: 280px; height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        canvas#orb {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
        }
        .orb-counter {
            position: relative; z-index: 2;
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem; font-weight: 300;
            color: var(--text-bright);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .orb-counter.visible { opacity: 0.7; }

        .instruction {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem; font-weight: 300; font-style: italic;
            letter-spacing: 0.08em;
            color: var(--text);
            min-height: 1.5em;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .instruction.idle {
            font-style: normal; font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dim);
            letter-spacing: 0.12em;
        }

        .modes {
            display: flex; gap: 6px;
            flex-wrap: wrap; justify-content: center;
        }
        .mode-btn {
            background: transparent;
            border: 1px solid rgba(196, 181, 160, 0.1);
            color: var(--text-dim);
            padding: 7px 20px; border-radius: 999px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem; font-weight: 400;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 0.08em;
        }
        .mode-btn:hover { border-color: rgba(196, 181, 160, 0.25); color: var(--text); }
        .mode-btn.active {
            border-color: rgba(212, 160, 67, 0.35);
            background: rgba(212, 160, 67, 0.06);
            color: var(--glow-core);
        }

        .session {
            position: fixed; top: 28px; right: 28px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem; font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            opacity: 0; transition: opacity 0.5s ease;
            z-index: 10;
        }
        .session.visible { opacity: 1; }

        /* ── Fireflies view ── */
        canvas#fireflies {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            cursor: pointer;
        }
        .firefly-ui {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .firefly-ui.visible { opacity: 1; }

        .firefly-score {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }
        .firefly-score span {
            color: var(--glow-core);
            font-size: 1.4rem;
        }

        /* ── Sound toggle ── */
        .sound-toggle {
            position: fixed;
            bottom: 28px; right: 28px;
            background: transparent;
            border: 1px solid rgba(196, 181, 160, 0.08);
            color: var(--text-dim);
            width: 42px; height: 42px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .sound-toggle:hover { border-color: rgba(196, 181, 160, 0.2); color: var(--text); }
        .sound-toggle.active { border-color: rgba(212, 160, 67, 0.3); color: var(--glow-core); }

        /* ── Floating motes (shared) ── */
        .motes {
            position: fixed; inset: 0;
            pointer-events: none; overflow: hidden;
        }
        .mote {
            position: absolute; border-radius: 50%;
            background: var(--glow-core); opacity: 0;
        }
        @keyframes drift-mote {
            0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
            15% { opacity: var(--mote-opacity, 0.15); }
            85% { opacity: calc(var(--mote-opacity, 0.15) * 0.3); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1); }
        }

        @media (max-width: 480px) {
            .orb-wrap { width: 220px; height: 220px; }
            .orb-counter { font-size: 2.6rem; }
            .instruction { font-size: 1.3rem; }
            .breath-scene { gap: 36px; }
        }
    </style>
</head>
<body>

<div class="wash wash-1"></div>
<div class="wash wash-2"></div>
<div class="wash wash-3"></div>
<div class="motes" id="motes"></div>

<!-- Tab nav -->
<nav class="tabs">
    <button class="tab-btn active" data-view="breathe">ademen</button>
    <button class="tab-btn" data-view="fireflies">vuurvliegjes</button>
    <a class="tab-btn" href="/gedachten.html">gedachten</a>
</nav>

<!-- Breathing view -->
<div class="view active" id="view-breathe">
    <div class="session" id="session">00:00</div>
    <div class="breath-scene">
        <div class="orb-wrap" id="orbWrap">
            <canvas id="orb"></canvas>
            <div class="orb-counter" id="counter"></div>
        </div>
        <div class="instruction idle" id="instruction">tik om te beginnen</div>
        <div class="modes">
            <button class="mode-btn active" data-mode="relax">ontspannen</button>
            <button class="mode-btn" data-mode="calm">kalmeren</button>
            <button class="mode-btn" data-mode="sleep">slapen</button>
            <button class="mode-btn" data-mode="focus">focussen</button>
        </div>
    </div>
</div>

<!-- Fireflies view -->
<div class="view" id="view-fireflies">
    <canvas id="fireflies"></canvas>
    <div class="firefly-ui" id="fireflyUi">
        <div class="firefly-score">gevangen: <span id="fireflyScore">0</span></div>
    </div>
</div>

<button class="sound-toggle" id="soundBtn" title="Geluid aan/uit">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path class="sound-waves" d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14" opacity="0.4"/>
    </svg>
</button>

<script>
// ═══════════════════════════════════════════
//  SHARED
// ═══════════════════════════════════════════
let audioCtx = null;
let soundOn = false;
let currentView = 'breathe';

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

const soundBtn = document.getElementById('soundBtn');
soundBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    soundOn = !soundOn;
    soundBtn.classList.toggle('active', soundOn);
    if (soundOn) {
        initAudio();
        audioCtx.resume();
        if (currentView === 'breathe') startAmbient();
    } else {
        stopAmbient();
    }
});

// Floating motes
const motesEl = document.getElementById('motes');
for (let i = 0; i < 15; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    const size = 1.5 + Math.random() * 2.5;
    m.style.width = m.style.height = size + 'px';
    m.style.left = Math.random() * 100 + '%';
    m.style.top = Math.random() * 100 + '%';
    m.style.setProperty('--dx', (Math.random() - 0.5) * 120 + 'px');
    m.style.setProperty('--dy', (-30 - Math.random() * 100) + 'px');
    m.style.setProperty('--mote-opacity', (0.06 + Math.random() * 0.12).toFixed(2));
    m.style.animation = `drift-mote ${12 + Math.random() * 18}s ${Math.random() * 20}s linear infinite`;
    motesEl.appendChild(m);
}

// ── Tab switching ──
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const view = btn.dataset.view;
        if (view === currentView) return;

        // Stop breathing if switching away
        if (currentView === 'breathe') stopBreathing();

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        currentView = view;

        if (view === 'fireflies') {
            sizeFireflyCanvas();
            fireflyUi.classList.add('visible');
        } else {
            fireflyUi.classList.remove('visible');
            sizeBreathCanvas();
        }
    });
});


// ═══════════════════════════════════════════
//  BREATHING
// ═══════════════════════════════════════════
const breathModes = {
    relax: { inhale: 4, holdIn: 4,  exhale: 6, holdOut: 2 },
    calm:  { inhale: 4, holdIn: 7,  exhale: 8, holdOut: 0 },
    sleep: { inhale: 4, holdIn: 4,  exhale: 8, holdOut: 4 },
    focus: { inhale: 5, holdIn: 5,  exhale: 5, holdOut: 5 },
};
const phaseConfig = [
    { key: 'inhale',  label: 'inademen'   },
    { key: 'holdIn',  label: 'vasthouden' },
    { key: 'exhale',  label: 'uitademen'  },
    { key: 'holdOut', label: 'rust'       },
];

let breathMode = 'relax';
let breathRunning = false;
let phaseIndex = 0;
let phaseTimeoutId = null;
let countdownIntervalId = null;
let sessionIntervalId = null;
let sessionStart = null;

let orbScale = 0, orbGlow = 0.3, orbAnim = null;
let ambientGain = null, ambientOscs = [];

const orbCanvas = document.getElementById('orb');
const orbCtx = orbCanvas.getContext('2d');
const counterEl = document.getElementById('counter');
const instructionEl = document.getElementById('instruction');
const sessionEl = document.getElementById('session');
const orbWrap = document.getElementById('orbWrap');

function sizeBreathCanvas() {
    const rect = orbWrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    orbCanvas.width = rect.width * dpr;
    orbCanvas.height = rect.height * dpr;
    orbCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
sizeBreathCanvas();

function drawOrb() {
    if (currentView !== 'breathe') { requestAnimationFrame(drawOrb); return; }

    const w = orbCanvas.width / (window.devicePixelRatio || 1);
    const h = orbCanvas.height / (window.devicePixelRatio || 1);
    const cx = w / 2, cy = h / 2;
    orbCtx.clearRect(0, 0, w, h);

    if (orbAnim) {
        const elapsed = (performance.now() - orbAnim.startTime) / 1000;
        const t = Math.min(elapsed / orbAnim.duration, 1);
        const eased = 0.5 - 0.5 * Math.cos(Math.PI * t);
        orbScale = orbAnim.from + (orbAnim.to - orbAnim.from) * eased;
        orbGlow = orbAnim.glowFrom + (orbAnim.glowTo - orbAnim.glowFrom) * eased;
        if (t >= 1) orbAnim = null;
    }

    const minR = w * 0.15, maxR = w * 0.38;
    const r = minR + (maxR - minR) * orbScale;

    const gOuter = orbCtx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 2.2);
    gOuter.addColorStop(0, `rgba(212, 160, 67, ${0.04 * orbGlow})`);
    gOuter.addColorStop(0.5, `rgba(196, 118, 42, ${0.02 * orbGlow})`);
    gOuter.addColorStop(1, 'transparent');
    orbCtx.fillStyle = gOuter;
    orbCtx.fillRect(0, 0, w, h);

    const gMid = orbCtx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.4);
    gMid.addColorStop(0, `rgba(212, 160, 67, ${0.15 * orbGlow})`);
    gMid.addColorStop(0.6, `rgba(196, 118, 42, ${0.06 * orbGlow})`);
    gMid.addColorStop(1, 'transparent');
    orbCtx.fillStyle = gMid;
    orbCtx.beginPath(); orbCtx.arc(cx, cy, r * 1.4, 0, Math.PI * 2); orbCtx.fill();

    const gCore = orbCtx.createRadialGradient(cx, cy - r * 0.15, r * 0.1, cx, cy, r);
    gCore.addColorStop(0, `rgba(232, 195, 120, ${0.35 * orbGlow})`);
    gCore.addColorStop(0.4, `rgba(212, 160, 67, ${0.2 * orbGlow})`);
    gCore.addColorStop(0.8, `rgba(196, 118, 42, ${0.08 * orbGlow})`);
    gCore.addColorStop(1, 'transparent');
    orbCtx.fillStyle = gCore;
    orbCtx.beginPath(); orbCtx.arc(cx, cy, r, 0, Math.PI * 2); orbCtx.fill();

    orbCtx.strokeStyle = `rgba(212, 160, 67, ${0.08 * orbGlow})`;
    orbCtx.lineWidth = 1;
    orbCtx.beginPath(); orbCtx.arc(cx, cy, r + 2, 0, Math.PI * 2); orbCtx.stroke();

    requestAnimationFrame(drawOrb);
}
drawOrb();

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        breathMode = btn.dataset.mode;
        if (breathRunning) { stopBreathing(); startBreathing(); }
    });
});

orbWrap.addEventListener('click', () => {
    if (breathRunning) stopBreathing(); else startBreathing();
});
document.getElementById('view-breathe').addEventListener('click', (e) => {
    if (e.target.closest('.mode-btn') || e.target.closest('.sound-toggle') || e.target.closest('.orb-wrap') || e.target.closest('.tabs')) return;
    if (breathRunning) stopBreathing(); else startBreathing();
});

function startBreathing() {
    breathRunning = true;
    phaseIndex = 0;
    sessionStart = Date.now();
    sessionEl.classList.add('visible');
    instructionEl.classList.remove('idle');
    sessionIntervalId = setInterval(updateSession, 1000);
    runPhase();
}

function stopBreathing() {
    breathRunning = false;
    clearTimeout(phaseTimeoutId);
    clearInterval(countdownIntervalId);
    clearInterval(sessionIntervalId);
    phaseTimeoutId = countdownIntervalId = sessionIntervalId = null;
    orbAnim = null; orbScale = 0; orbGlow = 0.3;
    counterEl.classList.remove('visible'); counterEl.textContent = '';
    instructionEl.textContent = 'tik om te beginnen';
    instructionEl.classList.add('idle');
    sessionEl.classList.remove('visible'); sessionEl.textContent = '00:00';
    stopAmbient();
}

function runPhase() {
    if (!breathRunning) return;
    const mode = breathModes[breathMode];
    const phase = phaseConfig[phaseIndex];
    const duration = mode[phase.key];

    if (duration === 0) {
        phaseIndex = (phaseIndex + 1) % phaseConfig.length;
        runPhase(); return;
    }

    if (phase.key === 'inhale') {
        orbAnim = { from: orbScale, to: 1, glowFrom: orbGlow, glowTo: 1, startTime: performance.now(), duration };
    } else if (phase.key === 'exhale') {
        orbAnim = { from: orbScale, to: 0, glowFrom: orbGlow, glowTo: 0.3, startTime: performance.now(), duration };
    } else {
        orbAnim = null;
    }

    instructionEl.textContent = phase.label;
    if (soundOn) playPhaseTone(phase.key);

    clearInterval(countdownIntervalId);
    let remaining = duration;
    counterEl.textContent = remaining;
    counterEl.classList.add('visible');
    countdownIntervalId = setInterval(() => {
        remaining--;
        if (remaining > 0) { counterEl.textContent = remaining; }
        else { counterEl.textContent = ''; counterEl.classList.remove('visible'); clearInterval(countdownIntervalId); countdownIntervalId = null; }
    }, 1000);

    phaseTimeoutId = setTimeout(() => {
        phaseIndex = (phaseIndex + 1) % phaseConfig.length;
        runPhase();
    }, duration * 1000);
}

function updateSession() {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    sessionEl.textContent = `${String(Math.floor(elapsed / 60)).padStart(2, '0')}:${String(elapsed % 60).padStart(2, '0')}`;
}

// Ambient drone
function startAmbient() {
    if (!audioCtx || ambientOscs.length > 0) return;
    ambientGain = audioCtx.createGain();
    ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
    ambientGain.gain.linearRampToValueAtTime(0.035, audioCtx.currentTime + 2);
    ambientGain.connect(audioCtx.destination);
    [65.41, 98.0, 130.81, 196.0].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        g.gain.value = i === 0 ? 0.5 : 0.25;
        osc.connect(g); g.connect(ambientGain); osc.start();
        ambientOscs.push({ osc, gain: g });
    });
}

function stopAmbient() {
    if (ambientGain) {
        ambientGain.gain.linearRampToValueAtTime(0, (audioCtx?.currentTime || 0) + 1);
        setTimeout(() => {
            ambientOscs.forEach(({ osc }) => { try { osc.stop(); } catch(e) {} });
            ambientOscs = []; ambientGain = null;
        }, 1200);
    }
}

function playPhaseTone(phaseKey) {
    if (!audioCtx) return;
    audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = ({ inhale: 392, holdIn: 440, exhale: 330, holdOut: 262 })[phaseKey] || 392;
    osc.type = 'sine';
    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
    osc.start(now); osc.stop(now + 2);
}


// ═══════════════════════════════════════════
//  FIREFLIES GAME
// ═══════════════════════════════════════════
const ffCanvas = document.getElementById('fireflies');
const ffCtx = ffCanvas.getContext('2d');
const fireflyUi = document.getElementById('fireflyUi');
const scoreEl = document.getElementById('fireflyScore');

let ffW = 0, ffH = 0;
let fireflies = [];
let particles = [];
let ffScore = 0;

const FF_COLORS = [
    { r: 212, g: 160, b: 67 },   // warm gold
    { r: 196, g: 118, b: 42 },   // amber
    { r: 180, g: 200, b: 140 },  // pale green
    { r: 140, g: 180, b: 200 },  // pale blue
    { r: 200, g: 150, b: 170 },  // dusty rose
];

function sizeFireflyCanvas() {
    const dpr = window.devicePixelRatio || 1;
    ffW = window.innerWidth;
    ffH = window.innerHeight;
    ffCanvas.width = ffW * dpr;
    ffCanvas.height = ffH * dpr;
    ffCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
sizeFireflyCanvas();
window.addEventListener('resize', () => {
    sizeFireflyCanvas();
    sizeBreathCanvas();
});

function spawnFirefly() {
    const col = FF_COLORS[Math.floor(Math.random() * FF_COLORS.length)];
    const radius = 12 + Math.random() * 18;
    return {
        x: radius + Math.random() * (ffW - radius * 2),
        y: radius + Math.random() * (ffH - radius * 2),
        r: radius,
        col,
        // Slow, wandering velocity
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        // Pulsing
        pulseOffset: Math.random() * Math.PI * 2,
        pulseSpeed: 0.8 + Math.random() * 0.6,
        // Fade in
        life: 0,
        alive: true,
        // Wander noise
        wanderAngle: Math.random() * Math.PI * 2,
        wanderSpeed: 0.005 + Math.random() * 0.01,
    };
}

// Start with some fireflies
for (let i = 0; i < 8; i++) fireflies.push(spawnFirefly());

// Spawn new ones periodically
setInterval(() => {
    if (currentView === 'fireflies' && fireflies.length < 12) {
        fireflies.push(spawnFirefly());
    }
}, 2500);

function popFirefly(ff, x, y) {
    ff.alive = false;
    ffScore++;
    scoreEl.textContent = ffScore;

    // Burst into particles
    const count = 12 + Math.floor(Math.random() * 8);
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const speed = 1 + Math.random() * 3;
        particles.push({
            x: ff.x,
            y: ff.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            r: 1.5 + Math.random() * 2.5,
            col: ff.col,
            life: 1,
            decay: 0.012 + Math.random() * 0.012,
        });
    }

    // Sound
    if (soundOn && audioCtx) {
        audioCtx.resume();
        // Soft chime — random pentatonic note
        const pentatonic = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3];
        const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(g); g.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.12, now + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
        osc.start(now); osc.stop(now + 1.5);

        // Second harmonic, softer
        const osc2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2;
        osc2.connect(g2); g2.connect(audioCtx.destination);
        g2.gain.setValueAtTime(0, now);
        g2.gain.linearRampToValueAtTime(0.04, now + 0.05);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 1);
        osc2.start(now); osc2.stop(now + 1);
    }
}

// Click / tap handling
ffCanvas.addEventListener('click', (e) => {
    const rect = ffCanvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // Check if we hit a firefly (check in reverse so topmost first)
    for (let i = fireflies.length - 1; i >= 0; i--) {
        const ff = fireflies[i];
        if (!ff.alive) continue;
        const dx = ff.x - x, dy = ff.y - y;
        // Generous hit area (1.5x radius for fat fingers)
        if (dx * dx + dy * dy < (ff.r * 1.5) ** 2) {
            popFirefly(ff, x, y);
            break;
        }
    }
});

// Touch support
ffCanvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = ffCanvas.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;

    for (let i = fireflies.length - 1; i >= 0; i--) {
        const ff = fireflies[i];
        if (!ff.alive) continue;
        const dx = ff.x - x, dy = ff.y - y;
        if (dx * dx + dy * dy < (ff.r * 1.8) ** 2) {
            popFirefly(ff, x, y);
            break;
        }
    }
}, { passive: false });

function drawFireflies(time) {
    requestAnimationFrame(drawFireflies);
    if (currentView !== 'fireflies') return;

    ffCtx.clearRect(0, 0, ffW, ffH);
    const t = time / 1000;

    // Update & draw fireflies
    for (let i = fireflies.length - 1; i >= 0; i--) {
        const ff = fireflies[i];
        if (!ff.alive) { fireflies.splice(i, 1); continue; }

        // Fade in
        if (ff.life < 1) ff.life = Math.min(1, ff.life + 0.008);

        // Wander
        ff.wanderAngle += (Math.random() - 0.5) * 0.15;
        ff.vx += Math.cos(ff.wanderAngle) * ff.wanderSpeed;
        ff.vy += Math.sin(ff.wanderAngle) * ff.wanderSpeed;

        // Damping
        ff.vx *= 0.985;
        ff.vy *= 0.985;

        ff.x += ff.vx;
        ff.y += ff.vy;

        // Soft bounce off edges
        const margin = ff.r * 2;
        if (ff.x < margin) { ff.x = margin; ff.vx = Math.abs(ff.vx) * 0.5; }
        if (ff.x > ffW - margin) { ff.x = ffW - margin; ff.vx = -Math.abs(ff.vx) * 0.5; }
        if (ff.y < margin) { ff.y = margin; ff.vy = Math.abs(ff.vy) * 0.5; }
        if (ff.y > ffH - margin) { ff.y = ffH - margin; ff.vy = -Math.abs(ff.vy) * 0.5; }

        // Pulse
        const pulse = 0.6 + 0.4 * Math.sin(t * ff.pulseSpeed + ff.pulseOffset);
        const alpha = ff.life * pulse;
        const { r: cr, g: cg, b: cb } = ff.col;

        // Outer glow
        const g1 = ffCtx.createRadialGradient(ff.x, ff.y, 0, ff.x, ff.y, ff.r * 3);
        g1.addColorStop(0, `rgba(${cr}, ${cg}, ${cb}, ${0.06 * alpha})`);
        g1.addColorStop(1, 'transparent');
        ffCtx.fillStyle = g1;
        ffCtx.beginPath(); ffCtx.arc(ff.x, ff.y, ff.r * 3, 0, Math.PI * 2); ffCtx.fill();

        // Inner glow
        const g2 = ffCtx.createRadialGradient(ff.x, ff.y, 0, ff.x, ff.y, ff.r);
        g2.addColorStop(0, `rgba(${cr}, ${cg}, ${cb}, ${0.5 * alpha})`);
        g2.addColorStop(0.5, `rgba(${cr}, ${cg}, ${cb}, ${0.15 * alpha})`);
        g2.addColorStop(1, 'transparent');
        ffCtx.fillStyle = g2;
        ffCtx.beginPath(); ffCtx.arc(ff.x, ff.y, ff.r, 0, Math.PI * 2); ffCtx.fill();

        // Bright core
        const g3 = ffCtx.createRadialGradient(ff.x, ff.y, 0, ff.x, ff.y, ff.r * 0.35);
        g3.addColorStop(0, `rgba(255, 250, 230, ${0.6 * alpha})`);
        g3.addColorStop(1, 'transparent');
        ffCtx.fillStyle = g3;
        ffCtx.beginPath(); ffCtx.arc(ff.x, ff.y, ff.r * 0.35, 0, Math.PI * 2); ffCtx.fill();
    }

    // Update & draw particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }

        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.vy += 0.015; // tiny gravity

        const { r: cr, g: cg, b: cb } = p.col;
        const a = p.life * 0.7;

        // Particle glow
        const pg = ffCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
        pg.addColorStop(0, `rgba(${cr}, ${cg}, ${cb}, ${a * 0.4})`);
        pg.addColorStop(1, 'transparent');
        ffCtx.fillStyle = pg;
        ffCtx.beginPath(); ffCtx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2); ffCtx.fill();

        // Particle core
        ffCtx.fillStyle = `rgba(${cr}, ${cg}, ${cb}, ${a})`;
        ffCtx.beginPath(); ffCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ffCtx.fill();
    }
}
requestAnimationFrame(drawFireflies);
</script>
