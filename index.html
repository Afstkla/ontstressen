<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontstressen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e1a;
            --text: #c8d6e5;
            --text-dim: #576574;
            --accent: #48dbfb;
            --accent-glow: rgba(72, 219, 251, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Ambient background blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            pointer-events: none;
            will-change: transform;
        }
        .blob-1 { width: 500px; height: 500px; background: #2e86de; top: -100px; left: -100px; animation: drift1 25s ease-in-out infinite; }
        .blob-2 { width: 600px; height: 600px; background: #a29bfe; bottom: -150px; right: -150px; animation: drift2 30s ease-in-out infinite; }
        .blob-3 { width: 400px; height: 400px; background: #00cec9; top: 50%; left: 50%; animation: drift3 20s ease-in-out infinite; }

        @keyframes drift1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(80px, 60px); } }
        @keyframes drift2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-70px, -50px); } }
        @keyframes drift3 { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-40%, -60%) scale(1.2); } }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 20px;
        }

        /* Breathing circle */
        .breath-ring {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breath-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border: 2px solid rgba(72, 219, 251, 0.3);
            transition: transform 0.3s ease;
        }

        .breath-circle.inhale {
            animation: inhale var(--inhale-duration) ease-in-out forwards;
        }
        .breath-circle.exhale {
            animation: exhale var(--exhale-duration) ease-in-out forwards;
        }
        .breath-circle.hold-in, .breath-circle.hold-out {
            /* stays at current scale */
        }

        @keyframes inhale {
            0% { transform: scale(1); border-color: rgba(72, 219, 251, 0.3); }
            100% { transform: scale(1.7); border-color: rgba(72, 219, 251, 0.7); }
        }
        @keyframes exhale {
            0% { transform: scale(1.7); border-color: rgba(72, 219, 251, 0.7); }
            100% { transform: scale(1); border-color: rgba(72, 219, 251, 0.3); }
        }

        /* Orbit dots */
        .orbit {
            position: absolute;
            inset: 0;
            animation: spin 12s linear infinite;
        }
        .orbit-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.4;
        }
        .orbit-dot:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
        .orbit-dot:nth-child(2) { bottom: 0; left: 50%; transform: translateX(-50%); }
        .orbit-dot:nth-child(3) { left: 0; top: 50%; transform: translateY(-50%); }
        .orbit-dot:nth-child(4) { right: 0; top: 50%; transform: translateY(-50%); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .instruction {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: lowercase;
            min-height: 2em;
            display: flex;
            align-items: center;
            opacity: 0.9;
            transition: opacity 0.5s;
        }

        .timer {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        /* Mode selector */
        .modes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-dim);
            padding: 8px 18px;
            border-radius: 999px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.05em;
        }
        .mode-btn:hover { border-color: rgba(72, 219, 251, 0.3); color: var(--text); }
        .mode-btn.active {
            border-color: rgba(72, 219, 251, 0.5);
            background: var(--accent-glow);
            color: var(--accent);
        }

        /* Sound toggle */
        .sound-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-dim);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sound-toggle:hover { border-color: rgba(72, 219, 251, 0.3); color: var(--text); }
        .sound-toggle.active { border-color: rgba(72, 219, 251, 0.5); color: var(--accent); }

        /* Session timer */
        .session {
            position: fixed;
            top: 24px;
            right: 24px;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        /* Tap anywhere hint */
        .hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--text-dim);
            opacity: 0.5;
            letter-spacing: 0.1em;
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float-up linear infinite;
        }
        @keyframes float-up {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            10% { opacity: 0.3; }
            90% { opacity: 0.1; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1); }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="particles" id="particles"></div>

<div class="session" id="session">00:00</div>

<div class="container">
    <div class="breath-ring">
        <div class="orbit">
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
        </div>
        <div class="breath-circle" id="circle"></div>
    </div>

    <div class="instruction" id="instruction">tik om te beginnen</div>
    <div class="timer" id="timer"></div>

    <div class="modes">
        <button class="mode-btn active" data-mode="relax">ontspannen</button>
        <button class="mode-btn" data-mode="calm">kalmeren</button>
        <button class="mode-btn" data-mode="sleep">slapen</button>
        <button class="mode-btn" data-mode="focus">focussen</button>
    </div>
</div>

<button class="sound-toggle" id="soundBtn" title="Geluid aan/uit">&#9835;</button>
<div class="hint">tik ergens om te starten</div>

<script>
    const modes = {
        relax:  { inhale: 4, holdIn: 4, exhale: 6, holdOut: 2, label: 'ontspannen' },
        calm:   { inhale: 4, holdIn: 7, exhale: 8, holdOut: 0, label: 'kalmeren' },
        sleep:  { inhale: 4, holdIn: 4, exhale: 8, holdOut: 4, label: 'slapen' },
        focus:  { inhale: 5, holdIn: 5, exhale: 5, holdOut: 5, label: 'focussen' },
    };

    const phases = [
        { key: 'inhale',  label: 'inademen',    durationKey: 'inhale' },
        { key: 'hold-in', label: 'vasthouden',  durationKey: 'holdIn' },
        { key: 'exhale',  label: 'uitademen',   durationKey: 'exhale' },
        { key: 'hold-out',label: 'rust',         durationKey: 'holdOut' },
    ];

    let currentMode = 'relax';
    let running = false;
    let phaseIndex = 0;
    let phaseTimer = null;
    let countdownTimer = null;
    let countdown = 0;
    let sessionStart = null;
    let sessionTimer = null;
    let audioCtx = null;
    let soundOn = false;

    const circle = document.getElementById('circle');
    const instruction = document.getElementById('instruction');
    const timerEl = document.getElementById('timer');
    const sessionEl = document.getElementById('session');
    const soundBtn = document.getElementById('soundBtn');

    // Particles
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = (Math.random() * 15) + 's';
        p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
        particlesEl.appendChild(p);
    }

    // Mode buttons
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            if (running) {
                stopBreathing();
                startBreathing();
            }
        });
    });

    // Start/stop on tap
    document.body.addEventListener('click', (e) => {
        if (e.target.closest('.mode-btn') || e.target.closest('.sound-toggle')) return;
        if (running) {
            stopBreathing();
        } else {
            startBreathing();
        }
    });

    function startBreathing() {
        running = true;
        phaseIndex = 0;
        sessionStart = Date.now();
        document.querySelector('.hint').style.display = 'none';
        sessionTimer = setInterval(updateSession, 1000);
        runPhase();
    }

    function stopBreathing() {
        running = false;
        clearTimeout(phaseTimer);
        clearInterval(countdownTimer);
        clearInterval(sessionTimer);
        circle.className = 'breath-circle';
        instruction.textContent = 'tik om te beginnen';
        timerEl.textContent = '';
        sessionEl.textContent = '00:00';
        document.querySelector('.hint').style.display = '';
    }

    function runPhase() {
        if (!running) return;

        const mode = modes[currentMode];
        const phase = phases[phaseIndex];
        const duration = mode[phase.durationKey];

        // Skip phases with 0 duration
        if (duration === 0) {
            phaseIndex = (phaseIndex + 1) % phases.length;
            runPhase();
            return;
        }

        // Set CSS custom properties for animation duration
        circle.style.setProperty('--inhale-duration', mode.inhale + 's');
        circle.style.setProperty('--exhale-duration', mode.exhale + 's');

        // Apply animation class
        circle.className = 'breath-circle ' + phase.key;
        instruction.textContent = phase.label;

        // Play tone
        if (soundOn) playTone(phase.key);

        // Countdown
        countdown = duration;
        timerEl.textContent = countdown;
        countdownTimer = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                timerEl.textContent = countdown;
            } else {
                timerEl.textContent = '';
                clearInterval(countdownTimer);
            }
        }, 1000);

        // Next phase
        phaseTimer = setTimeout(() => {
            phaseIndex = (phaseIndex + 1) % phases.length;
            runPhase();
        }, duration * 1000);
    }

    function updateSession() {
        const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
        const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const s = String(elapsed % 60).padStart(2, '0');
        sessionEl.textContent = `${m}:${s}`;
    }

    // Ambient sound
    soundBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        soundOn = !soundOn;
        soundBtn.classList.toggle('active', soundOn);
        if (soundOn && !audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    });

    function playTone(phase) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const freqs = { 'inhale': 285, 'hold-in': 396, 'exhale': 528, 'hold-out': 174 };
        osc.frequency.value = freqs[phase] || 285;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.3);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);

        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 1.5);
    }
</script>

</body>
</html>
