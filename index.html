<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ontstressen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0d0a;
            --bg-warm: #1a1611;
            --text: #c4b5a0;
            --text-dim: #6b5e4f;
            --text-bright: #e8dcc8;
            --glow-core: #d4a043;
            --glow-mid: #c4762a;
            --glow-outer: #8b4513;
            --sage: #7a8b6f;
            --sage-dim: rgba(122, 139, 111, 0.15);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Grain overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.035;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
            z-index: 9999;
        }

        /* Warm ambient background washes */
        .wash {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            will-change: transform;
        }
        .wash-1 {
            width: 50vmax;
            height: 50vmax;
            background: radial-gradient(circle, rgba(139, 69, 19, 0.12) 0%, transparent 70%);
            top: -15vmax;
            right: -10vmax;
            animation: sway1 35s ease-in-out infinite;
        }
        .wash-2 {
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, rgba(122, 139, 111, 0.08) 0%, transparent 70%);
            bottom: -20vmax;
            left: -15vmax;
            animation: sway2 40s ease-in-out infinite;
        }
        .wash-3 {
            width: 35vmax;
            height: 35vmax;
            background: radial-gradient(circle, rgba(196, 118, 42, 0.06) 0%, transparent 70%);
            top: 40%;
            left: 55%;
            animation: sway3 28s ease-in-out infinite;
        }

        @keyframes sway1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-40px, 30px) scale(1.05); } }
        @keyframes sway2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -20px) scale(1.08); } }
        @keyframes sway3 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-20px, -30px) scale(1.1); } }

        /* Main layout */
        .scene {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
            padding: 20px;
        }

        /* Canvas breathing orb */
        .orb-wrap {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        canvas#orb {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .orb-counter {
            position: relative;
            z-index: 2;
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 300;
            color: var(--text-bright);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .orb-counter.visible {
            opacity: 0.7;
        }

        /* Instruction text */
        .instruction {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 0.08em;
            color: var(--text);
            min-height: 1.5em;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .instruction.idle {
            font-style: normal;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dim);
            letter-spacing: 0.12em;
        }

        /* Mode pills */
        .modes {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            background: transparent;
            border: 1px solid rgba(196, 181, 160, 0.1);
            color: var(--text-dim);
            padding: 7px 20px;
            border-radius: 999px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 0.08em;
        }
        .mode-btn:hover {
            border-color: rgba(196, 181, 160, 0.25);
            color: var(--text);
        }
        .mode-btn.active {
            border-color: rgba(212, 160, 67, 0.35);
            background: rgba(212, 160, 67, 0.06);
            color: var(--glow-core);
        }

        /* Session timer */
        .session {
            position: fixed;
            top: 28px;
            right: 28px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .session.visible { opacity: 1; }

        /* Sound toggle */
        .sound-toggle {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: transparent;
            border: 1px solid rgba(196, 181, 160, 0.08);
            color: var(--text-dim);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .sound-toggle:hover {
            border-color: rgba(196, 181, 160, 0.2);
            color: var(--text);
        }
        .sound-toggle.active {
            border-color: rgba(212, 160, 67, 0.3);
            color: var(--glow-core);
        }

        /* Floating motes */
        .motes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .mote {
            position: absolute;
            border-radius: 50%;
            background: var(--glow-core);
            opacity: 0;
        }

        @keyframes drift-mote {
            0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
            15% { opacity: var(--mote-opacity, 0.15); }
            85% { opacity: calc(var(--mote-opacity, 0.15) * 0.3); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .orb-wrap { width: 220px; height: 220px; }
            .orb-counter { font-size: 2.6rem; }
            .instruction { font-size: 1.3rem; }
            .scene { gap: 36px; }
        }
    </style>
</head>
<body>

<div class="wash wash-1"></div>
<div class="wash wash-2"></div>
<div class="wash wash-3"></div>
<div class="motes" id="motes"></div>

<div class="session" id="session">00:00</div>

<div class="scene">
    <div class="orb-wrap" id="orbWrap">
        <canvas id="orb"></canvas>
        <div class="orb-counter" id="counter"></div>
    </div>

    <div class="instruction idle" id="instruction">tik om te beginnen</div>

    <div class="modes">
        <button class="mode-btn active" data-mode="relax">ontspannen</button>
        <button class="mode-btn" data-mode="calm">kalmeren</button>
        <button class="mode-btn" data-mode="sleep">slapen</button>
        <button class="mode-btn" data-mode="focus">focussen</button>
    </div>
</div>

<button class="sound-toggle" id="soundBtn" title="Geluid aan/uit">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path class="sound-waves" d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14" opacity="0.4"/>
    </svg>
</button>

<script>
// ── Breathing modes ──
const modes = {
    relax: { inhale: 4, holdIn: 4,  exhale: 6, holdOut: 2 },
    calm:  { inhale: 4, holdIn: 7,  exhale: 8, holdOut: 0 },
    sleep: { inhale: 4, holdIn: 4,  exhale: 8, holdOut: 4 },
    focus: { inhale: 5, holdIn: 5,  exhale: 5, holdOut: 5 },
};

const phaseConfig = [
    { key: 'inhale',   label: 'inademen'   },
    { key: 'holdIn',   label: 'vasthouden' },
    { key: 'exhale',   label: 'uitademen'  },
    { key: 'holdOut',  label: 'rust'       },
];

// ── State ──
let currentMode = 'relax';
let running = false;
let phaseIndex = 0;
let phaseTimeoutId = null;
let countdownIntervalId = null;
let sessionIntervalId = null;
let sessionStart = null;

// Orb animation state — time-based, tied to phase duration
let orbScale = 0;          // 0 = small, 1 = large
let orbGlow = 0.3;
let orbAnim = null;        // { from, to, glowFrom, glowTo, startTime, duration }

// Audio
let audioCtx = null;
let ambientGain = null;
let ambientOscs = [];
let soundOn = false;

// ── DOM ──
const canvas = document.getElementById('orb');
const ctx = canvas.getContext('2d');
const counterEl = document.getElementById('counter');
const instructionEl = document.getElementById('instruction');
const sessionEl = document.getElementById('session');
const soundBtn = document.getElementById('soundBtn');
const orbWrap = document.getElementById('orbWrap');

// ── Canvas setup ──
function sizeCanvas() {
    const rect = orbWrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);

// ── Floating motes ──
const motesEl = document.getElementById('motes');
for (let i = 0; i < 15; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    const size = 1.5 + Math.random() * 2.5;
    m.style.width = m.style.height = size + 'px';
    m.style.left = Math.random() * 100 + '%';
    m.style.top = Math.random() * 100 + '%';
    m.style.setProperty('--dx', (Math.random() - 0.5) * 120 + 'px');
    m.style.setProperty('--dy', (-30 - Math.random() * 100) + 'px');
    m.style.setProperty('--mote-opacity', (0.06 + Math.random() * 0.12).toFixed(2));
    m.style.animation = `drift-mote ${12 + Math.random() * 18}s ${Math.random() * 20}s linear infinite`;
    motesEl.appendChild(m);
}

// ── Orb rendering ──
let animFrame;
function drawOrb() {
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    const cx = w / 2;
    const cy = h / 2;

    ctx.clearRect(0, 0, w, h);

    // Time-based interpolation tied to breathing phase duration
    if (orbAnim) {
        const elapsed = (performance.now() - orbAnim.startTime) / 1000;
        const t = Math.min(elapsed / orbAnim.duration, 1);
        // Smooth ease-in-out (sine curve — feels like natural breathing)
        const eased = 0.5 - 0.5 * Math.cos(Math.PI * t);
        orbScale = orbAnim.from + (orbAnim.to - orbAnim.from) * eased;
        orbGlow = orbAnim.glowFrom + (orbAnim.glowTo - orbAnim.glowFrom) * eased;
        if (t >= 1) orbAnim = null; // done, hold position
    }

    const minR = w * 0.15;
    const maxR = w * 0.38;
    const r = minR + (maxR - minR) * orbScale;

    // Outer glow
    const gOuter = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 2.2);
    gOuter.addColorStop(0, `rgba(212, 160, 67, ${0.04 * orbGlow})`);
    gOuter.addColorStop(0.5, `rgba(196, 118, 42, ${0.02 * orbGlow})`);
    gOuter.addColorStop(1, 'transparent');
    ctx.fillStyle = gOuter;
    ctx.fillRect(0, 0, w, h);

    // Mid glow
    const gMid = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.4);
    gMid.addColorStop(0, `rgba(212, 160, 67, ${0.15 * orbGlow})`);
    gMid.addColorStop(0.6, `rgba(196, 118, 42, ${0.06 * orbGlow})`);
    gMid.addColorStop(1, 'transparent');
    ctx.fillStyle = gMid;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 1.4, 0, Math.PI * 2);
    ctx.fill();

    // Core orb
    const gCore = ctx.createRadialGradient(cx, cy - r * 0.15, r * 0.1, cx, cy, r);
    gCore.addColorStop(0, `rgba(232, 195, 120, ${0.35 * orbGlow})`);
    gCore.addColorStop(0.4, `rgba(212, 160, 67, ${0.2 * orbGlow})`);
    gCore.addColorStop(0.8, `rgba(196, 118, 42, ${0.08 * orbGlow})`);
    gCore.addColorStop(1, 'transparent');
    ctx.fillStyle = gCore;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // Soft ring
    ctx.strokeStyle = `rgba(212, 160, 67, ${0.08 * orbGlow})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
    ctx.stroke();

    animFrame = requestAnimationFrame(drawOrb);
}
drawOrb();

// ── Mode buttons ──
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        if (running) {
            stopBreathing();
            startBreathing();
        }
    });
});

// ── Start/stop ──
orbWrap.addEventListener('click', (e) => {
    if (running) stopBreathing(); else startBreathing();
});
document.body.addEventListener('click', (e) => {
    if (e.target.closest('.mode-btn') || e.target.closest('.sound-toggle') || e.target.closest('.orb-wrap')) return;
    if (running) stopBreathing(); else startBreathing();
});

function startBreathing() {
    running = true;
    phaseIndex = 0;
    sessionStart = Date.now();
    sessionEl.classList.add('visible');
    instructionEl.classList.remove('idle');
    sessionIntervalId = setInterval(updateSession, 1000);
    runPhase();
}

function stopBreathing() {
    running = false;
    clearTimeout(phaseTimeoutId);
    clearInterval(countdownIntervalId);
    clearInterval(sessionIntervalId);
    phaseTimeoutId = null;
    countdownIntervalId = null;
    sessionIntervalId = null;

    orbAnim = null;
    orbScale = 0;
    orbGlow = 0.3;
    counterEl.classList.remove('visible');
    counterEl.textContent = '';
    instructionEl.textContent = 'tik om te beginnen';
    instructionEl.classList.add('idle');
    sessionEl.classList.remove('visible');
    sessionEl.textContent = '00:00';

    stopAmbient();
}

// ── Phase runner ──
function runPhase() {
    if (!running) return;

    const mode = modes[currentMode];
    const phase = phaseConfig[phaseIndex];
    const duration = mode[phase.key];

    // Skip 0-duration phases
    if (duration === 0) {
        phaseIndex = (phaseIndex + 1) % phaseConfig.length;
        runPhase();
        return;
    }

    // Animate orb over the exact phase duration
    if (phase.key === 'inhale') {
        orbAnim = { from: orbScale, to: 1, glowFrom: orbGlow, glowTo: 1, startTime: performance.now(), duration: duration };
    } else if (phase.key === 'exhale') {
        orbAnim = { from: orbScale, to: 0, glowFrom: orbGlow, glowTo: 0.3, startTime: performance.now(), duration: duration };
    } else {
        orbAnim = null; // hold phases: freeze at current position
    }

    instructionEl.textContent = phase.label;

    // Play phase tone
    if (soundOn) playPhaseTone(phase.key);

    // Countdown — clear any prior interval first
    clearInterval(countdownIntervalId);
    let remaining = duration;
    counterEl.textContent = remaining;
    counterEl.classList.add('visible');

    countdownIntervalId = setInterval(() => {
        remaining--;
        if (remaining > 0) {
            counterEl.textContent = remaining;
        } else {
            counterEl.textContent = '';
            counterEl.classList.remove('visible');
            clearInterval(countdownIntervalId);
            countdownIntervalId = null;
        }
    }, 1000);

    // Schedule next phase
    phaseTimeoutId = setTimeout(() => {
        phaseIndex = (phaseIndex + 1) % phaseConfig.length;
        runPhase();
    }, duration * 1000);
}

function updateSession() {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    sessionEl.textContent = `${m}:${s}`;
}

// ── Audio ──
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

soundBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    soundOn = !soundOn;
    soundBtn.classList.toggle('active', soundOn);

    if (soundOn) {
        initAudio();
        audioCtx.resume();
        startAmbient();
    } else {
        stopAmbient();
    }
});

// Continuous ambient drone — warm, low, soothing
function startAmbient() {
    if (!audioCtx || ambientOscs.length > 0) return;

    ambientGain = audioCtx.createGain();
    ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
    ambientGain.gain.linearRampToValueAtTime(0.035, audioCtx.currentTime + 2);
    ambientGain.connect(audioCtx.destination);

    // Layer of soft sine tones (C2 chord, very low)
    const freqs = [65.41, 98.0, 130.81, 196.0];
    freqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.value = i === 0 ? 0.5 : 0.25;
        osc.connect(g);
        g.connect(ambientGain);
        osc.start();
        ambientOscs.push({ osc, gain: g });
    });
}

function stopAmbient() {
    if (ambientGain) {
        ambientGain.gain.linearRampToValueAtTime(0, (audioCtx?.currentTime || 0) + 1);
        setTimeout(() => {
            ambientOscs.forEach(({ osc }) => { try { osc.stop(); } catch(e) {} });
            ambientOscs = [];
            ambientGain = null;
        }, 1200);
    }
}

// Short melodic tone per phase transition
function playPhaseTone(phaseKey) {
    if (!audioCtx) return;
    audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const notes = { inhale: 392, holdIn: 440, exhale: 330, holdOut: 262 };
    osc.frequency.value = notes[phaseKey] || 392;
    osc.type = 'sine';

    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 2);

    osc.start(now);
    osc.stop(now + 2);
}
</script>

</body>
</html>
